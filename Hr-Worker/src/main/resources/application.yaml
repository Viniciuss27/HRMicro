spring:
  application:
    name: hr-worker

  profiles:
    active: dev

  # Config Server (Spring Cloud Config)
  config:
    import: optional:configserver:http://localhost:8888

  # Banco H2 (ambiente de teste)
  datasource:
    url: jdbc:h2:mem:testdb
    username: sa
    password: ""

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create
    defer-datasource-initialization: true
    show-sql: true

server:
  port: ${port:0}

eureka:
  instance:
    instance-id: ${spring.application.name}:${random.value}
    prefer-ip-address: true

  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
    register-with-eureka: true
    fetch-registry: true

management:
  endpoints:
    web:
      exposure:
        include: "*"

  endpoint:
    health:
      show-details: always

test:
  config: "teste local"